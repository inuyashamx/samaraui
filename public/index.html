<!DOCTYPE html>
<html lang="en" class="h-full" style="overflow:hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samara Code UI</title>
  <link rel="stylesheet" href="/_app/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#0f0f0f', 1: '#1a1a1a', 2: '#242424', 3: '#2e2e2e' },
            accent: { DEFAULT: '#d97706', light: '#f59e0b' },
            border: { DEFAULT: '#333', light: '#444' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body class="h-full bg-surface text-gray-200 dark">
  <div id="app" class="h-full flex flex-col"></div>
  <script src="/_app/app.js"></script>
</body>
</html>
